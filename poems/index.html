<!DOCTYPE html>
<html lang="en">

  <head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width initial-scale=1" />
  <meta http-equiv="X-UA-Compatible" content="IE=edge">

  <title>Poems | Siddharth Singh</title>
  <meta name="description" content="Poems.">

  <link rel="shortcut icon" href="/assets/img/favicon.ico">
  <link rel="canonical" href="/poems/">

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,500;1,400&family=Tiro+Devanagari+Hindi&display=swap" rel="stylesheet">

  <style>
    * { box-sizing: border-box; }
    html, body { margin: 0; padding: 0; }

    body {
      /* plain dark, with the faintest breath of light behind the words */
      background: radial-gradient(ellipse at 50% 42%, #14111a 0%, #0a080d 72%);
      color: #e9e2d6;
      font-family: 'Cormorant Garamond', Georgia, serif;
      min-height: 100vh;
      -webkit-font-smoothing: antialiased;
      display: flex;
      flex-direction: column;
    }

    /* the quote, alone in the middle of the dark */
    .center {
      flex: 1 0 auto;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 8vh 1.5rem;
    }
    .quote {
      max-width: 32rem;
      text-align: center;
    }
    .quote blockquote {
      margin: 0; padding: 0; border: 0;
      font-style: italic;
      font-weight: 400;
      font-size: clamp(2rem, 5.5vw, 3.4rem);
      line-height: 1.3;
      color: #ece5d9;
    }
    .quote cite {
      display: block;
      margin-top: 1.8rem;
      font-style: normal;
      font-size: .95rem;
      letter-spacing: .3em;
      text-transform: uppercase;
      color: #6c6458;
    }

    /* the poems: lit in evening hues at the foot of the page */
    .index {
      flex-shrink: 0;
      display: flex;
      flex-wrap: wrap;
      justify-content: center;
      align-items: baseline;
      gap: 2.4rem;
      padding: 2rem 1.5rem 5vh;
    }
    .index a {
      text-decoration: none;
      font-size: clamp(2.4rem, 7vw, 4rem);
      line-height: 1.1;
      letter-spacing: .01em;
      /* each poem carries its own gradient via --poem-grad (warm dusk default) */
      background: var(--poem-grad, linear-gradient(105deg, #f0b96a 0%, #e08a6e 32%, #c06f8f 60%, #8a6aa6 82%, #5f5a90 100%));
      -webkit-background-clip: text;
      background-clip: text;
      -webkit-text-fill-color: transparent;
      color: transparent;
      transition: filter .5s ease, transform .5s ease;
    }
    .index a:hover,
    .index a:focus {
      filter: brightness(1.12) drop-shadow(0 4px 26px rgba(230, 138, 110, 0.45));
      transform: translateY(-2px);
    }
    .index a.deva { font-family: 'Tiro Devanagari Hindi', serif; }
  </style>
</head>

  <body>

    <div class="center">
      <div class="quote">
        <blockquote>&ldquo;Find what you love and let it kill you.&rdquo;</blockquote>
        <cite>&mdash; Charles Bukowski</cite>
      </div>
    </div>

    <!-- The list of poems. Add each new poem as a faint link here. -->
    <nav class="index" aria-label="poems">
      <a class="deva" href="/poems/shaam/">शाम</a>
      <a class="deva" href="/poems/uljhanein/" style="--poem-grad: linear-gradient(105deg, #b6cee0 0%, #93b1cb 38%, #8197b8 66%, #6f7ba6 100%)">उलझनें</a>
      <a class="deva" href="/poems/kinaare/" style="--poem-grad: linear-gradient(105deg, #7fd8cf 0%, #45b0b8 40%, #2f8a8c 68%, #1f6067 100%)">किनारे</a>
      <a class="deva" href="/poems/parchaiyan/" style="--poem-grad: linear-gradient(105deg, #d4dae6 0%, #a3adbf 38%, #797f90 66%, #565d6e 100%)">परछाइयाँ</a>
    </nav>

  </body>

</html>
